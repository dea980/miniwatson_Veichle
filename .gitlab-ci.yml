# GitLab CI — GitHub Actions(.github/workflows/ci.yml)와 동일 게이트(./mvnw test).
# 이식성 증명: 같은 단위테스트가 GitHub/GitLab 양쪽에서 동일하게 돈다.
# 이미지 빌드/배포(build-image, DinD + registry)는 추후 — 라이브 배포 단계에서 추가.
stages:
  - test

unit-test:
  stage: test
  image: maven:3.9-eclipse-temurin-21      # maven+JDK21 내장. IBM이면 ibm-semeru-runtimes:open-21-jdk
  variables:
    MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .m2/repository/                     # 의존성 캐시(빌드 가속)
  script:
    - chmod +x mvnw
    - ./mvnw -B -ntp test                   # 53개 단위테스트 게이트
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
