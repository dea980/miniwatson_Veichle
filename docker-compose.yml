# pgvector 검증용 Postgres. vector.store=pgvector 일 때 PgVectorStore가 여기에 붙는다.
# 기동:  docker compose up -d
# 종료:  docker compose down        (데이터 유지)
# 초기화: docker compose down -v     (볼륨까지 삭제 → 다음 기동 시 빈 DB)
services:
  postgres:
    image: pgvector/pgvector:pg16   # pgvector 확장 내장 (CREATE EXTENSION vector 가능)
    container_name: miniwatson-veichle-pg
    environment:
      POSTGRES_DB: miniwatson
      POSTGRES_USER: miniwatson
      POSTGRES_PASSWORD: miniwatson
    ports:
      - "55433:5432"   # 호스트 55433 -> 컨테이너 5432. (원본 miniwatson-pg가 55432라 vehicle은 55433으로 분리)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miniwatson -d miniwatson"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
