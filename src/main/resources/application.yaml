spring:
  application:
    name: miniwatson
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

retrieval:
  hybrid:
    enabled: true        # false면 벡터-only (비교용)

chunking:
  strategy: recursive    # fixed | recursive | semantic
  max-size: 1000

rerank:
  strategy: mmr          # none | llm | mmr | cross  (mmr 기본: eval recall 100%, cross는 맥에서 폴백)

storage:
  tier:
    threshold: 3          # 데모용 낮은 값: 3개마다 JSON(hot)→Parquet(cold) compact가 바로 보이게. prod에서 override

server:
  port: 8080
  error:
    include-message: always

ollama:
  url: ${OLLAMA_URL:http://localhost:11434}
  chat-model: ${OLLAMA_CHAT_MODEL:ibm/granite4:latest}
  chat-models: ${OLLAMA_CHAT_MODELS:ibm/granite4:latest,gemma4}
  vision-model: ${OLLAMA_VISION_MODEL:llava:latest}
  embed-model: ${OLLAMA_EMBED_MODEL:nomic-embed-text}
  num-predict: ${OLLAMA_NUM_PREDICT:256}

vector:
  index:
    lsh:
      enabled: false

eval:
  overrides:
    enabled: ${EVAL_OVERRIDES:true} # dev/demo = true , prod = false