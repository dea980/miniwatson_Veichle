spring:
  application:
    name: miniwatson
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  devtools:
    restart:
      enabled: false   # 대량 ingest 중 자동 재시작이 응답을 끊는 사고 방지. 일반 개발 복귀 시 true.

retrieval:
  hybrid:
    enabled: true        # false면 벡터-only (비교용)

chunking:
  strategy: recursive    # fixed | recursive | semantic
  max-size: 1400         # 1000→1400: 수백 쪽 매뉴얼의 청크 수↓(임베딩 콜·인덱스 크기↓). RAG는 소스당 600자 표출이라 검색 품질 영향 미미.

ingest:
  embed:
    concurrency: 8       # 청크 임베딩 동시 호출 수. Ollama 부하 보고 4~16 조정. 1로 두면 직렬과 동등.

storage:
  # 단일 블록으로 통합(YAML 중복 키 금지 — SnakeYAML strict가 거부, 컨텍스트 로드 실패의 원인).
  tier:
    threshold: 3           # 데모용 낮은 값: 3개마다 JSON(hot)→Parquet(cold) compact가 바로 보이게. prod에서 override(운영은 500 권장).
  expand-acronyms: true    # 약어->정식명 주입(CAIO->Chief AI Officer). false로 A/B 비교. 근거 docs/CHUNKING.md

rerank:
  strategy: mmr          # none | llm | mmr | cross  (mmr 기본: eval recall 100%, cross는 맥에서 폴백)

server:
  port: 8080
  error:
    include-message: always

ollama:
  url: ${OLLAMA_URL:http://localhost:11434}
  chat-model: ${OLLAMA_CHAT_MODEL:qwen3:8b}   # 자동 eval 1등(RESULTS §2.2): 누수0·점수0.97. granite4는 chat-models로 선택 가능(IBM 내러티브 유지)
  # 모델 비교군: 우리 FT(vehicle-*) + 베이스(qwen2.5) + 한국어 특화/신형 후보(exaone3.5, qwen3) — 'ollama pull' 후 드롭다운에서 A/B. 근거 docs/RESULTS.md
  chat-models: ${OLLAMA_CHAT_MODELS:ibm/granite4:latest,gemma4,vehicle-qwen2.5-1.5b,qwen2.5:1.5b-instruct-fp16,qwen2.5:7b-instruct,exaone3.5:7.8b,qwen3:8b}
  vision-model: ${OLLAMA_VISION_MODEL:llava:latest}
  embed-model: ${OLLAMA_EMBED_MODEL:granite-embedding:278m}  # 비교 승자: 한+영 코퍼스서 recall 97%(한국어 11/11). 근거 docs/EMBEDDINGS.md 7절
  num-predict: ${OLLAMA_NUM_PREDICT:512}   # 256은 진단서·종합 답변이 문장 중간에 잘려서 상향

# 추론 제공자 선택 — 활성 제공자 1개만 빈으로 뜬다(@ConditionalOnProperty). LLM-ABSTRACTION.md
llm:
  provider: ${LLM_PROVIDER:ollama}   # ollama | watsonx | vertex | bedrock | azure

# watsonx.ai (llm.provider=watsonx 일 때만 사용). 키/프로젝트는 .env로 주입(커밋 금지).
watsonx:
  url: ${WATSONX_URL:https://us-south.ml.cloud.ibm.com}
  api-key: ${WATSONX_API_KEY:}
  project-id: ${WATSONX_PROJECT_ID:}
  model: ${WATSONX_MODEL:ibm/granite-3-8b-instruct}
  models: ${WATSONX_MODELS:ibm/granite-3-8b-instruct}
  embed-model: ${WATSONX_EMBED_MODEL:ibm/granite-embedding-278m-multilingual}   # 768차원 = 현재와 동일
  num-predict: ${WATSONX_NUM_PREDICT:256}

vector:
  store: ${VECTOR_STORE:memory}   # memory(인메모리 LSH/brute) | pgvector(영속). 근거 docs/PGVECTOR.md
  index:
    lsh:
      enabled: false

# pgvector 연결 (vector.store=pgvector 일 때만 사용). docker-compose.yml의 값과 일치.
pgvector:
  url: ${PGVECTOR_URL:jdbc:postgresql://localhost:55433/miniwatson}   # docker-compose.yml 호스트 매핑(55433)과 일치. 원본 miniwatson-pg(55432)와 분리
  user: ${PGVECTOR_USER:miniwatson}
  password: ${PGVECTOR_PASSWORD:miniwatson}

eval:
  overrides:
    enabled: ${EVAL_OVERRIDES:true} # dev/demo = true , prod = false

# 정형 데이터셋 레지스트리 — Agent text-to-SQL 대상. 새 표는 한 줄 추가만.
vehicle:
  tables:
    recalls: ${VEHICLE_RECALLS_CSV:data/vehicle/recalls/hyundai_recalls_nhtsa.csv}
    complaints: ${VEHICLE_COMPLAINTS_CSV:data/vehicle/complaints/hyundai_complaints_nhtsa.csv}
    parts: ${VEHICLE_PARTS_CSV:data/vehicle/parts/parts_pricing.csv}   # 견적용 샘플 단가
    inspection: ${VEHICLE_INSPECTION_CSV:data/vehicle/inspection/inspection_sample.csv}   # 점검기록부 샘플
  estimate:
    labor-rate-krw: ${LABOR_RATE_KRW:50000}   # 공임 시급(원) — 데모 샘플

security:
  mode: ${SECURITY_MODE:apikey-filter}
  enabled: ${SECURITY_ENABLED:false}   # dev 기본 off → eval 그대로 동작
  api-keys:
    dev-all: "*"                        # 전체 권한(데모/관리)
    acme:    "default,kr-bcg"           # 예시 테넌트

# 운영 모니터링 — Actuator + Prometheus. /actuator/prometheus 를 Prometheus가 스크레이프.
# 주의: actuator는 /api/** 가 아니라 ApiKeyAuthFilter를 안 탄다 → 운영에선 리버스 프록시에서 외부 차단(내부망 Prometheus만 접근). SECURITY.md 7절.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: miniwatson
    distribution:
      percentiles-histogram:
        miniwatson.llm.latency: true     # p50/p95/p99 히스토그램 버킷 (Prometheus histogram_quantile)