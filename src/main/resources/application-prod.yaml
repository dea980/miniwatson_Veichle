spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/miniwatson}
    username: ${DB_USER:miniwatson}
    password: ${DB_PASSWORD:miniwatson}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update          # 테이블 자동 생성 (validate 아님 — 처음엔 update)
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# 운영: hot(JSON) 누적분만 가끔 Parquet로 풀-리라이트 (데모값 3 대신 현실값)
storage:
  tier:
    threshold: 500