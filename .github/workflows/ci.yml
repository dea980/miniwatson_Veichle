name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin/HotSpot)
        uses: actions/setup-java@v4
        with:
          distribution: temurin     # 배포 런타임과 일치(Dockerfile이 eclipse-temurin:21-jre). Semeru는 walkStackFrames 크래시(docs/HOTSPOT-RUNTIME.md)로 회피.
          java-version: '21'
          cache: maven

      # 53개 단위테스트 = CI 게이트. 외부 의존(Ollama/pgvector) 없이 도는 것만 돌린다.
      # (golden.json eval·B/C 라이브·pgvector recall은 Ollama/서비스 필요 → 별도 nightly/수동)
      - name: Unit tests
        run: chmod +x mvnw && ./mvnw -B -ntp test

  # 프론트엔드 게이트 — next build(타입체크 포함)로 회귀 차단
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build (typecheck + next build)
        run: cd frontend && npm ci && npm run build

  # 품질 게이트 — 서버 없이 도는 회귀 검사(PRD §6). python3만 필요.
  # CJK(한자·가나) 누수 0 + wedge 골든셋 파싱. 서버가 필요한 recall/refusal은 nightly/수동.
  quality-guards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: CJK 누수 회귀 (self-test)
        run: python3 eval/check_cjk.py
      - name: 골든셋 파싱 검증
        run: |
          python3 -c "import json; json.load(open('eval/golden.json'))"
          python3 -c "import json; json.load(open('eval/golden_mechanic.json'))"
          python3 -c "import ast; ast.parse(open('eval/run_eval.py').read())"

  # CD: 백/프/품질 게이트 통과 + main 에서만 이미지 빌드→GHCR 푸시 (실제 배포는 인프라 측)
  build-image:
    needs: [test, frontend, quality-guards]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      # GHCR은 이미지 이름이 전부 소문자여야 함. 레포명에 대문자(miniwatson_Veichle의 V)가 있어
      # ${{ github.repository }}를 그대로 쓰면 "repository name must be lowercase"로 실패 → 소문자로 변환.
      - name: Set lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
      # Oracle Always Free는 ARM(arm64). amd64만 만들면 거기서 못 뜸 → 멀티아치 빌드.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
