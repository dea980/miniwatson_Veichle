# 로컬 개발용 모니터링 스택 (Prometheus + Grafana만).
# 앱은 호스트에서 ./mvnw spring-boot:run 으로 돌리고, 이 스택이 host.docker.internal:8080을 스크레이프한다.
# 풀스택(앱+DB+Ollama까지 컨테이너)은 docker-compose.prod.yml 사용.
#
# 사용:
#   1) 터미널1: ./mvnw spring-boot:run        (앱 8080)
#   2) 터미널2: docker compose -f docker-compose.monitoring.yml up -d
#   3) 접속:  Grafana http://localhost:3000 (admin/admin)  ·  Prometheus http://localhost:9090
services:
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux 호환(맥/윈은 기본 제공)
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-local:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  grafana-local:
